<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WolfRadio">
<meta name="theme-color" content="#0a0a0f">
<title>Radio v2.30</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --surface:#12121a; --border:#1e1e2e;
  --accent:#00d4ff; --green:#39ff82; --amber:#ffb347; --red:#ff4466;
  --text:#c8d0e0; --muted:#4a5060;
  --mono:'Share Tech Mono',monospace; --sans:'Barlow Condensed',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden}

/* HEADER & NAV */
header{background:rgba(10,10,15,0.96); border-bottom:1px solid var(--border); padding:10px 14px}
.header-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px}
.logo{font-family:var(--mono); font-size:1em; color:var(--accent); letter-spacing:2px}
.clock-display{font-family:var(--mono); font-size:1.2em; color:var(--green)}
.now-playing{background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:8px 12px}
.np-station{font-weight:700; font-size:1em; color:#fff}
.np-controls{display:flex; align-items:center; gap:10px; margin-top:8px}
.btn-stop{background:rgba(255,68,102,0.15); border:1px solid var(--red); color:var(--red); padding:4px 12px; border-radius:4px; font-family:var(--mono); font-size:0.7em}

.tabs{display:flex; border-bottom:1px solid var(--border)}
.tab{flex:1; padding:12px; text-align:center; font-family:var(--mono); font-size:0.7em; color:var(--muted); cursor:pointer}
.tab.active{color:var(--accent); border-bottom:2px solid var(--accent)}

/* PANELS */
.panel{display:none; height:calc(100vh - 180px); overflow-y:auto; padding:12px}
.panel.active{display:block}

/* STATIONS */
.section-label{font-family:var(--mono); font-size:0.65em; color:var(--muted); padding:10px 0 5px; border-bottom:1px solid var(--border); margin-bottom:8px; letter-spacing:2px}
.stn-btn{display:flex; align-items:center; width:100%; padding:12px; margin-bottom:6px; background:var(--surface); border:1px solid var(--border); border-radius:6px; color:var(--text); text-align:left}
.stn-btn.active{border-color:var(--accent); background:rgba(0,212,255,0.05)}
.stn-num{font-family:var(--mono); font-size:0.7em; color:var(--muted); width:25px}

/* CARDS & PILLS */
.card{background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:14px; margin-bottom:12px}
.card-title{font-family:var(--mono); font-size:0.65em; color:var(--muted); margin-bottom:10px; letter-spacing:1px}
.pill-row{display:flex; gap:8px; flex-wrap:wrap; justify-content:center}
.pill{font-family:var(--mono); font-size:0.75em; padding:8px 16px; border:1px solid var(--border); border-radius:20px; background:var(--bg); color:var(--muted); cursor:pointer}
.pill.active{border-color:var(--amber); color:var(--amber)}
.countdown{font-family:var(--mono); font-size:2.5em; color:var(--green); text-align:center; padding:10px 0}

/* AVIATION LINKS */
.link-grid{display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px; margin-top:10px}
.av-link{display:flex; flex-direction:column; align-items:center; padding:8px; border-radius:6px; border:1px solid #333; text-decoration:none; color:var(--text); font-size:0.6em; font-family:var(--mono); background:rgba(255,255,255,0.02)}

canvas{width:100%; height:150px; background:var(--surface); border-radius:6px; border:1px solid var(--border)}
</style>
</head>
<body>

<audio id="audio" playsinline></audio>

<header>
  <div class="header-top">
    <div class="logo">WOLF-RADIO <span style="font-size:0.7em; color:var(--muted)">v2.30</span></div>
    <div class="clock-display" id="clockDisplay">00:00:00</div>
  </div>
  <div class="now-playing">
    <div class="np-station" id="npStation">Idle</div>
    <div class="np-controls">
      <button class="btn-stop" onclick="toggleStop()">STOP / PLAY</button>
      <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.7" style="flex:1" oninput="setVolume(this.value)">
    </div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('stations',this)">STATIONS</div>
  <div class="tab" onclick="switchTab('timer',this)">TIMER</div>
  <div class="tab" onclick="switchTab('viz',this)">VIZ</div>
</div>

<div class="panel active" id="panel-stations">
  <div class="section-label">GERMAN RADIO</div>
  <div id="list-german"></div>
  
  <div class="section-label">MUSIC</div>
  <div id="list-music"></div>
  
  <div class="section-label">ATC - SAN DIEGO AREA</div>
  <div id="list-atc"></div>
  
  <div class="section-label">PILOT TOOLS</div>
  <div class="link-grid">
    <a href="https://skyvector.com/" target="_blank" class="av-link">🗺️ SKYVECTOR</a>
    <a href="https://www.liveatc.net/" target="_blank" class="av-link">📡 LIVEATC</a>
    <a href="https://flightaware.com/" target="_blank" class="av-link">🛫 F-AWARE</a>
    <a href="https://www.plusoneflyers.org/" target="_blank" class="av-link">🏅 PLUS ONE</a>
    <a href="https://my.schedulemaster.com/" target="_blank" class="av-link">📅 SCHED-M</a>
  </div>
</div>

<div class="panel" id="panel-timer">
  <div class="card">
    <div class="card-title">EGG TIMER</div>
    <div class="pill-row">
      <div class="pill active" onclick="setEggTimer(6)">🥚 START 6 MIN EGG</div>
    </div>
    <div class="countdown" id="eggCountdown">00:00</div>
    <div class="pill-row">
      <div class="pill" id="stopEggBtn" style="display:none; border-color:var(--red); color:var(--red)" onclick="stopEggTimer()">STOP ALARM</div>
    </div>
  </div>
</div>

<div class="panel" id="panel-viz">
  <canvas id="vizCanvas"></canvas>
  <div class="section-label">MODES</div>
  <div class="pill-row">
    <div class="pill active" onclick="setViz('fft')">FFT</div>
    <div class="pill" onclick="setViz('scope')">SCOPE</div>
    <div class="pill" onclick="setViz('aurora')">AURORA</div>
  </div>
</div>

<script>
const STATIONS = [
  {n:1, name:"181.FM Awesome 80s", url:"http://listen.181fm.com/181-awesome80s_128k.mp3", cat:"music"},
  {n:2, name:"SomaFM Underground 80s", url:"http://ice1.somafm.com/u80s-128-mp3", cat:"music"},
  {n:3, name:"Antenne Bayern", url:"http://stream.antenne.de/antenne/stream/mp3", cat:"german"},
  {n:4, name:"SWR3", url:"http://liveradio.swr.de/sw282p3/swr3/play.mp3", cat:"german"},
  {n:5, name:"KMYF Tower", url:"http://d.liveatc.net/kmyf1_twr", cat:"atc"},
  {n:6, name:"KMYF Ground", url:"http://d.liveatc.net/ksan_kmyf_gnd", cat:"atc"},
  {n:7, name:"KMYF ATIS", url:"http://s1-fmt2.liveatc.net/ksan_kmyf_atis", cat:"atc"},
  {n:8, name:"KSAN Tower", url:"http://d.liveatc.net/ksan1_twr", cat:"atc"},
  {n:9, name:"KSAN Ground", url:"http://d.liveatc.net/ksan1_gnd", cat:"atc"},
  {n:10, name:"SoCal Approach (Del Mar)", url:"http://d.liveatc.net/ksan_app_delmar", cat:"atc"}
];

const audio = document.getElementById('audio');
let eggEnd = null, eggInterval = null, beepInterval = null;

function init() {
  STATIONS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'stn-btn';
    btn.onclick = () => playStn(s);
    btn.innerHTML = `<span class="stn-num">${s.n}</span><span class="stn-name">${s.name}</span>`;
    document.getElementById('list-' + s.cat).appendChild(btn);
  });
  setInterval(updateClock, 1000);
}

function playStn(s) {
  audio.src = s.url;
  audio.play();
  document.getElementById('npStation').textContent = s.name;
  document.querySelectorAll('.stn-btn').forEach(b => b.classList.remove('active'));
}

function updateClock() {
  const now = new Date();
  document.getElementById('clockDisplay').textContent = now.toTimeString().split(' ')[0];
}

function switchTab(id, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  el.classList.add('active');
}

function setVolume(v) { audio.volume = v; }
function toggleStop() { audio.paused ? audio.play() : audio.pause(); }

// EGG TIMER
function setEggTimer(m) {
  stopEggTimer();
  eggEnd = Date.now() + (m * 60 * 1000);
  eggInterval = setInterval(() => {
    const rem = eggEnd - Date.now();
    if (rem <= 0) { triggerAlarm(); return; }
    const min = Math.floor(rem/60000), sec = Math.floor((rem%60000)/1000);
    document.getElementById('eggCountdown').textContent = `${min}:${String(sec).padStart(2,'0')}`;
  }, 500);
}

function triggerAlarm() {
  clearInterval(eggInterval);
  document.getElementById('stopEggBtn').style.display = 'block';
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  beepInterval = setInterval(() => {
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.type = 'square'; o.frequency.value = 880;
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.5);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + 0.5);
  }, 1000);
}

function stopEggTimer() {
  clearInterval(eggInterval); clearInterval(beepInterval);
  document.getElementById('eggCountdown').textContent = "00:00";
  document.getElementById('stopEggBtn').style.display = 'none';
}

init();
</script>
</body>
</html>
