<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WolfRadio">
<meta name="theme-color" content="#0a0a0f">
<title>Radio v2.31</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<style>
:root {
  --bg:#0a0a0f; --surface:#12121a; --border:#1e1e2e;
  --accent:#00d4ff; --green:#39ff82; --amber:#ffb347; --red:#ff4466;
  --text:#c8d0e0; --muted:#4a5060;
  --mono:'Share Tech Mono',monospace; --sans:'Barlow Condensed',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px)}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.96);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 14px 8px}
.header-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.logo{font-family:var(--mono);font-size:1em;color:var(--accent);letter-spacing:3px}
.clock-display{font-family:var(--mono);font-size:1.3em;color:var(--green);margin-left:auto;letter-spacing:2px}
.sigbars{display:flex;gap:2px;align-items:flex-end;height:14px}
.sigbars span{width:3px;border-radius:1px;background:var(--muted);transition:background 0.3s}
.sigbars.active span{background:var(--green);box-shadow:0 0 4px var(--green)}
.now-playing{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 12px}
.np-station{font-weight:700;font-size:1em;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-controls{display:flex;align-items:center;gap:8px;margin-top:7px}
.btn-stop{background:rgba(255,68,102,0.15);border:1px solid var(--red);color:var(--red);
  font-family:var(--mono);font-size:0.68em;letter-spacing:1px;padding:4px 10px;border-radius:4px;cursor:pointer}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:90}
.tab{flex:1;padding:10px 4px;font-family:var(--mono);font-size:0.6em;letter-spacing:1px;text-align:center;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* PANELS */
.panel{display:none;padding:10px 12px 80px}
.panel.active{display:block}

/* VISUALIZER */
#vizCanvas{width:100%;height:150px;border-radius:6px;background:var(--surface);border:1px solid var(--border);display:block}
.viz-controls{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.viz-btn{font-family:var(--mono);font-size:0.65em;padding:5px 10px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--muted)}
.viz-btn.active{border-color:var(--accent);color:var(--accent)}

/* STATIONS */
.section-label{font-family:var(--mono);font-size:0.6em;letter-spacing:3px;color:var(--muted);padding:12px 4px 5px;border-bottom:1px solid var(--border);margin-bottom:5px;display:flex;align-items:center;gap:8px}
.stn-btn{display:flex;align-items:center;width:100%;padding:10px 12px;margin-bottom:4px;background:var(--surface);border:1px solid var(--border);border-radius:6px;cursor:pointer;text-align:left;gap:10px}
.stn-btn.active{border-color:var(--accent);background:rgba(0,212,255,0.05)}
.stn-num{font-family:var(--mono);font-size:0.62em;color:var(--muted);min-width:20px}
.stn-name{font-family:var(--sans);font-size:0.92em;font-weight:500;color:var(--text);flex:1}

/* CARDS & TIMER */
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px}
.pill-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.pill{font-family:var(--mono);font-size:0.75em;padding:6px 12px;border:1px solid var(--border);border-radius:20px;background:var(--bg);color:var(--muted);cursor:pointer}
.pill.active{border-color:var(--amber);color:var(--amber)}
.countdown{font-family:var(--mono);font-size:2.2em;color:var(--green);text-align:center;padding:10px 0;letter-spacing:4px}
.countdown.off{color:var(--muted);font-size:1em}
</style>
</head>
<body>

<audio id="audio" preload="none" playsinline></audio>

<header>
  <div class="header-top">
    <div class="logo">&#9632; RADIO <span style="color:var(--accent)">v2.31</span></div>
    <div class="sigbars" id="sigbars"><span></span><span></span><span></span><span></span></div>
    <div style="display:flex;flex-direction:column;align-items:flex-end">
      <div class="clock-display" id="clockDisplay">00:00:00</div>
      <div style="font-family:var(--mono);font-size:0.85em;color:var(--muted)"><span id="utcDisplay">00:00:00</span> <span style="color:var(--amber)">UTC</span></div>
    </div>
  </div>
  <div class="now-playing">
    <div class="np-station idle" id="npStation">Select a station</div>
    <div class="np-controls">
      <button class="btn-stop" onclick="toggleStop()">STOP/PLAY</button>
      <input type="range" id="volSlider" min="0" max="1" step="0.02" value="0.7" style="flex:1" oninput="setVolume(this.value)">
    </div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('stations',this)">STATIONS</div>
  <div class="tab" onclick="switchTab('viz',this)">VIZ</div>
  <div class="tab" onclick="switchTab('timer',this)">TIMER</div>
  <div class="tab" onclick="switchTab('mp3',this)">MP3/DRIVE</div>
</div>

<div class="panel active" id="panel-stations">
  <div id="stationList"></div>
</div>

<div class="panel" id="panel-viz">
  <canvas id="vizCanvas"></canvas>
  <div class="viz-controls">
    <button class="viz-btn active" onclick="setVizMode('fft',this)">FFT</button>
    <button class="viz-btn" onclick="setVizMode('aurora',this)">AURORA</button>
    <button class="viz-btn" onclick="setVizMode('nebula',this)">NEBULA</button>
    <button class="viz-btn" onclick="setVizMode('scope',this)">SCOPE</button>
  </div>
</div>

<div class="panel" id="panel-timer">
  <div class="card">
    <div style="font-family:var(--mono);font-size:0.65em;color:var(--muted);margin-bottom:10px">EGG TIMER</div>
    <div class="pill-row" style="justify-content:center">
      <div class="pill active" onclick="setEggTimer(6)">🥚 START 6 MIN EGG</div>
    </div>
    <div class="countdown off" id="eggCountdown">00:00</div>
    <div class="pill-row" style="justify-content:center">
      <div class="pill" id="stopEggBtn" style="display:none;border-color:var(--red);color:var(--red)" onclick="stopEggTimer()">STOP ALARM</div>
    </div>
  </div>

  <div class="card">
    <div style="font-family:var(--mono);font-size:0.65em;color:var(--muted);margin-bottom:10px">SLEEP TIMER</div>
    <div class="pill-row">
      <div class="pill" onclick="setSleep(15)">15m</div>
      <div class="pill" onclick="setSleep(30)">30m</div>
      <div class="pill" onclick="setSleep(60)">60m</div>
    </div>
    <div class="countdown off" id="sleepCountdown">OFF</div>
  </div>
</div>

<div class="panel" id="panel-mp3">
  <div class="card">
    <button onclick="openGDrivePicker()" style="width:100%;padding:12px;border-radius:6px;background:none;border:1px dashed var(--accent);color:var(--accent);font-family:var(--mono)">OPEN GOOGLE DRIVE</button>
  </div>
  <div id="mp3Tracks"></div>
</div>

<script>
const STATIONS = [
  {n:1, name:"181.FM Awesome 80s", url:"http://listen.181fm.com/181-awesome80s_128k.mp3", cat:"music"},
  {n:2, name:"SomaFM Underground 80s", url:"http://ice1.somafm.com/u80s-128-mp3", cat:"music"},
  {n:3, name:"Antenne Bayern", url:"http://stream.antenne.de/antenne/stream/mp3", cat:"german"},
  {n:4, name:"SWR3", url:"http://liveradio.swr.de/sw282p3/swr3/play.mp3", cat:"german"},
  {n:5, name:"SWR1 BW", url:"http://liveradio.swr.de/sw282p3/swr1bw/play.mp3", cat:"german"},
  {n:6, name:"KMYF ATIS", url:"http://s1-fmt2.liveatc.net/ksan_kmyf_atis", cat:"atc"},
  {n:7, name:"KMYF Tower", url:"http://d.liveatc.net/kmyf1_twr", cat:"atc"},
  {n:8, name:"KMYF Ground", url:"http://d.liveatc.net/ksan_kmyf_gnd", cat:"atc"},
  {n:9, name:"KSAN Tower", url:"http://d.liveatc.net/ksan1_twr", cat:"atc"},
  {n:10, name:"KSAN Ground", url:"http://d.liveatc.net/ksan1_gnd", cat:"atc"},
  {n:11, name:"SoCal Del Mar", url:"http://d.liveatc.net/ksan_app_delmar", cat:"atc"},
  {n:12, name:"KSDM Brown Tower", url:"http://d.liveatc.net/ksdm_twr", cat:"atc"},
  {n:13, name:"KRNM Ramona Tower", url:"http://d.liveatc.net/krnm2_twr", cat:"atc"},
  {n:14, name:"KSMO ATIS", url:"http://d.liveatc.net/ksmo2_atis", cat:"atc"},
  {n:15, name:"KSMO Tower", url:"http://d.liveatc.net/ksmo2_s", cat:"atc"}
];

const audio = document.getElementById('audio');
let curIdx = -1, audioCtx = null, vizRAF = null, vizMode = 'fft';
let eggEnd = null, eggInterval = null, beepInterval = null, sleepEnd = null;

function buildUI() {
  const list = document.getElementById('stationList');
  const cats = {german:"GERMAN RADIO", music:"MUSIC", atc:"ATC - SAN DIEGO"};
  for(let c in cats){
    const lbl = document.createElement('div'); lbl.className = 'section-label'; lbl.textContent = cats[c]; list.appendChild(lbl);
    STATIONS.filter(s=>s.cat===c).forEach(s=>{
      const b = document.createElement('button'); b.className = 'stn-btn'; b.onclick = () => play(s);
      b.innerHTML = `<span class="stn-num">${s.n}</span><span class="stn-name">${s.name}</span>`;
      list.appendChild(b);
    });
    if(c==='atc'){
       const d = document.createElement('div'); d.style.display='flex'; d.style.gap='4px'; d.style.marginTop='10px';
       [['SkyVector','https://skyvector.com'],['PlusOne','https://plusoneflyers.org'],['Sched-M','https://my.schedulemaster.com']].forEach(l=>{
         const a = document.createElement('a'); a.href=l[1]; a.target='_blank'; a.style.flex='1'; a.style.padding='10px'; a.style.border='1px solid #333'; a.style.textAlign='center'; a.style.fontSize='0.6em'; a.style.color='var(--accent)'; a.style.textDecoration='none'; a.textContent=l[0]; d.appendChild(a);
       });
       list.appendChild(d);
    }
  }
}

function play(s) {
  audio.src = s.url; audio.play();
  document.getElementById('npStation').textContent = s.name;
  document.getElementById('npStation').classList.remove('idle');
  document.getElementById('sigbars').classList.add('active');
  ensureCtx();
}

function ensureCtx() {
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') audioCtx.resume();
}

function tickClock() {
  const now = new Date();
  document.getElementById('clockDisplay').textContent = now.toTimeString().split(' ')[0];
  document.getElementById('utcDisplay').textContent = now.toISOString().split('T')[1].split('.')[0];
  if(sleepEnd && Date.now() >= sleepEnd){ audio.pause(); sleepEnd = null; document.getElementById('sleepCountdown').textContent="OFF"; }
}

function setEggTimer(m) {
  stopEggTimer(); eggEnd = Date.now() + (m*60000);
  document.getElementById('eggCountdown').classList.remove('off');
  eggInterval = setInterval(updateEgg, 500);
}

function updateEgg() {
  const rem = eggEnd - Date.now();
  if(rem <= 0){ triggerEggAlarm(); return; }
  const min = Math.floor(rem/60000), sec = Math.floor((rem%60000)/1000);
  const el = document.getElementById('eggCountdown');
  el.textContent = `${min}:${String(sec).padStart(2,'0')}`;
  el.style.color = rem < 60000 ? 'var(--red)' : 'var(--green)';
}

function triggerEggAlarm() {
  clearInterval(eggInterval); document.getElementById('stopEggBtn').style.display='block';
  ensureCtx();
  beepInterval = setInterval(() => {
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type='square'; o.frequency.value=880; g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+0.5);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.5);
  }, 1000);
}

function stopEggTimer() {
  clearInterval(eggInterval); clearInterval(beepInterval); eggEnd = null;
  document.getElementById('eggCountdown').textContent="00:00";
  document.getElementById('eggCountdown').classList.add('off');
  document.getElementById('stopEggBtn').style.display='none';
}

function switchTab(id, el) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active'); el.classList.add('active');
  if(id==='viz') startViz();
}

function startViz() {
  if(vizRAF) cancelAnimationFrame(vizRAF);
  const c = document.getElementById('vizCanvas'); const ctx = c.getContext('2d');
  function draw() {
    vizRAF = requestAnimationFrame(draw);
    ctx.fillStyle = '#0a0a0f'; ctx.fillRect(0,0,c.width,c.height);
    const time = Date.now()*0.002;
    ctx.strokeStyle = 'var(--accent)'; ctx.beginPath();
    for(let i=0; i<c.width; i++){
      const y = 75 + Math.sin(i*0.05 + time)*20 + Math.sin(i*0.02 + time*0.5)*10;
      i===0 ? ctx.moveTo(i,y) : ctx.lineTo(i,y);
    }
    ctx.stroke();
  }
  draw();
}

function setVizMode(m, b) {
  vizMode = m; document.querySelectorAll('.viz-btn').forEach(btn=>btn.classList.remove('active')); b.classList.add('active');
}

function toggleStop() { audio.paused ? audio.play() : audio.pause(); }
function setVolume(v) { audio.volume = v; }
function setSleep(m) { sleepEnd = Date.now() + m*60000; document.getElementById('sleepCountdown').classList.remove('off'); }

window.onload = () => { buildUI(); setInterval(tickClock, 1000); };
</script>
</body>
</html>
