<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>Radio v2.23</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<style>
:root {
  --bg:#0a0a0f; --surface:#12121a; --border:#1e1e2e;
  --accent:#00d4ff; --green:#39ff82; --amber:#ffb347; --red:#ff4466;
  --text:#c8d0e0; --muted:#4a5060;
  --mono:'Share Tech Mono',monospace; --sans:'Barlow Condensed',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px)}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.96);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 14px 8px}
.header-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.logo{font-family:var(--mono);font-size:1em;color:var(--accent);letter-spacing:3px}
.clock-display{font-family:var(--mono);font-size:1.3em;color:var(--green);margin-left:auto;letter-spacing:2px}
.sigbars{display:flex;gap:2px;align-items:flex-end;height:14px}
.sigbars span{width:3px;border-radius:1px;background:var(--muted);transition:background 0.3s}
.sigbars span:nth-child(1){height:4px}.sigbars span:nth-child(2){height:7px}
.sigbars span:nth-child(3){height:10px}.sigbars span:nth-child(4){height:14px}
.sigbars.active span{background:var(--green);box-shadow:0 0 4px var(--green)}

.now-playing{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 12px}
.np-station{font-weight:700;font-size:1em;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-station.idle{color:var(--muted);font-weight:300}
.np-meta{font-family:var(--mono);font-size:0.65em;color:var(--accent);margin-top:3px;min-height:1em}
.np-controls{display:flex;align-items:center;gap:8px;margin-top:7px}
.btn-stop{background:rgba(255,68,102,0.15);border:1px solid var(--red);color:var(--red);
  font-family:var(--mono);font-size:0.68em;letter-spacing:1px;padding:4px 10px;border-radius:4px;cursor:pointer}
.vol-wrap{flex:1;display:flex;align-items:center;gap:6px}
input[type=range]{flex:1;-webkit-appearance:none;height:3px;background:var(--border);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:90}
.tab{flex:1;padding:10px 4px;font-family:var(--mono);font-size:0.6em;text-align:center;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* PANELS */
.panel{display:none;padding:10px 12px 80px}
.panel.active{display:block}

/* VISUALIZER */
#vizCanvas{width:100%;height:180px;border-radius:6px;background:var(--surface);border:1px solid var(--border);display:block}
.viz-controls{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.viz-btn{font-family:var(--mono);font-size:0.65em;padding:6px 10px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--muted);cursor:pointer}
.viz-btn.active{border-color:var(--accent);color:var(--accent)}

/* STATIONS */
.section-label{font-family:var(--mono);font-size:0.6em;letter-spacing:3px;color:var(--muted);padding:12px 4px 5px;border-bottom:1px solid var(--border);margin-bottom:5px;display:flex;align-items:center;gap:8px}
.stn-btn{display:flex;align-items:center;width:100%;padding:10px 12px;margin-bottom:4px;background:var(--surface);border:1px solid var(--border);border-radius:6px;cursor:pointer;text-align:left;gap:10px}
.stn-btn.active{border-color:rgba(0,212,255,0.3);background:rgba(0,212,255,0.05)}
.stn-num{font-family:var(--mono);font-size:0.62em;color:var(--muted);min-width:20px}
.stn-name{font-family:var(--sans);font-size:0.92em;font-weight:500;color:var(--text);flex:1}
.stn-live{display:none;align-items:center;gap:4px;font-family:var(--mono);font-size:0.58em;color:var(--green)}
.stn-btn.active .stn-live{display:flex}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

.atc-link{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px 4px;border:1px solid;border-radius:6px;font-family:var(--mono);font-size:0.65em;text-decoration:none;text-align:center}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(30,30,46,0.95);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:0.72em;padding:8px 16px;border-radius:6px;transition:transform 0.3s;z-index:500}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<audio id="audio" preload="auto" crossorigin="anonymous" playsinline webkit-playsinline></audio>
<div class="toast" id="toast"></div>

<header>
  <div class="header-top">
    <div class="logo">■ RADIO <span style="font-size:0.9em;color:var(--accent)">v2.23</span></div>
    <div class="sigbars" id="sigbars"><span></span><span></span><span></span><span></span></div>
    <div style="display:flex;flex-direction:column;align-items:flex-end">
      <div class="clock-display" id="clockDisplay">00:00:00</div>
      <div style="font-family:var(--mono);font-size:0.85em;color:var(--muted)"><span id="utcDisplay">00:00:00</span> <span style="color:var(--amber)">UTC</span></div>
    </div>
  </div>
  <div class="now-playing">
    <div class="np-station idle" id="npStation">Select a station</div>
    <div class="np-meta" id="npMeta">&nbsp;</div>
    <div class="np-controls">
      <button class="btn-stop" id="btnStop" onclick="toggleStop()">■ STOP</button>
      <div class="vol-wrap">
        <input type="range" id="volSlider" min="0" max="1" step="0.02" value="0.8" oninput="setVolume(this.value)">
      </div>
    </div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('stations',this)">STATIONS</div>
  <div class="tab" onclick="switchTab('mp3',this)">MP3</div>
  <div class="tab" onclick="switchTab('viz',this)">VIZ</div>
  <div class="tab" onclick="switchTab('info',this)">INFO</div>
</div>

<div class="panel active" id="panel-stations">
  <div id="stationList"></div>
</div>

<div class="panel" id="panel-mp3">
  <div style="background:var(--surface);border:1px solid var(--border);padding:14px;border-radius:8px">
    <label style="display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border:1px dashed var(--accent);cursor:pointer;font-family:var(--mono);font-size:0.72em;color:var(--accent)">
      📁 LOAD LOCAL MP3s
      <input type="file" id="mp3FileInput" multiple accept="audio/*" style="display:none" onchange="loadMp3Files(this.files)">
    </label>
  </div>
  <div id="mp3TrackList" style="display:none;margin-top:10px">
    <div id="mp3Tracks"></div>
  </div>
</div>

<div class="panel" id="panel-viz">
  <canvas id="vizCanvas"></canvas>
  <div class="viz-controls">
    <button class="viz-btn active" onclick="setVizMode('fft',this)">FFT</button>
    <button class="viz-btn" onclick="setVizMode('radar',this)">RADAR</button>
    <button class="viz-btn" onclick="setVizMode('scope',this)">SCOPE</button>
  </div>
</div>

<div class="panel" id="panel-info">
  <div style="background:var(--surface);border:1px solid var(--border);padding:14px;border-radius:8px">
    <div style="font-family:var(--mono);font-size:0.7em;line-height:1.8em">
      <span style="color:var(--accent)">WolfTronix v2.23</span><br>
      • Synthetic Visualizer (iOS safe)<br>
      • Full ATC Stations restored (KMYF, KSAN, KSDM, KRNM, KSMO)<br>
      • iOS Background MP3 Support Active
    </div>
  </div>
</div>

<script>
const audio = document.getElementById('audio');
const STATIONS = [
  {n:1, name:"181.FM Awesome 80s", url:"https://listen.181fm.com/181-awesome80s_128k.mp3", cat:"music"},
  {n:2, name:"SomaFM Underground 80s", url:"https://ice1.somafm.com/u80s-128-mp3", cat:"music"},
  {n:3, name:"Antenne Bayern", url:"http://stream.antenne.de/antenne/stream/mp3", cat:"german"},
  {n:4, name:"1LIVE WDR", url:"http://wdr-1live-live.icecast.wdr.de/wdr/1live/live/mp3/128/stream.mp3", cat:"german"},
  {n:5, name:"SWR3", url:"http://liveradio.swr.de/sw282p3/swr3/play.mp3", cat:"german"},
  {n:6, name:"Bayern 3", url:"http://dispatcher.rndfnk.com/br/br3/live/mp3/low", cat:"german"},
  {n:7, name:"SWR1", url:"http://liveradio.swr.de/sw282p3/swr1bw/play.mp3", cat:"german"},
  {n:8, name:"KMYF ATIS", url:"http://s1-fmt2.liveatc.net/ksan_kmyf_atis", cat:"atc"},
  {n:9, name:"KMYF Tower", url:"http://d.liveatc.net/kmyf1_twr", cat:"atc"},
  {n:10, name:"KMYF Ground", url:"http://d.liveatc.net/ksan_kmyf_gnd", cat:"atc"},
  {n:11, name:"KMYF All (Twr)", url:"http://d.liveatc.net/ksan_kmyf_twr_both", cat:"atc"},
  {n:12, name:"KMYF SoCal Del Mar", url:"http://d.liveatc.net/ksan_app_delmar", cat:"atc"},
  {n:13, name:"KSAN Tower", url:"http://d.liveatc.net/ksan1_twr", cat:"atc"},
  {n:14, name:"KSAN Ground", url:"http://d.liveatc.net/ksan1_gnd", cat:"atc"},
  {n:15, name:"KSDM Ground/Tower", url:"http://d.liveatc.net/ksdm_twr", cat:"atc"},
  {n:16, name:"KRNM Tower", url:"http://d.liveatc.net/krnm2_twr", cat:"atc"},
  {n:17, name:"KSMO ATIS", url:"http://d.liveatc.net/ksmo2_atis", cat:"atc"},
  {n:18, name:"KSMO Tower", url:"http://d.liveatc.net/ksmo2_s", cat:"atc"},
  {n:19, name:"KSMO Ground", url:"http://d.liveatc.net/ksmo2_gnd", cat:"atc"}
];

let curIdx = -1, mp3Tracks = [], mp3CurIdx = -1;
let vizMode = 'fft', vizRAF = null, synthPhase = 0;

function buildUI() {
    const list = document.getElementById('stationList');
    const categories = [{key:'german', label:'GERMAN RADIO'},{key:'music', label:'MUSIC'},{key:'atc', label:'ATC — SD & KSMO'}];
    categories.forEach(cat => {
        const stns = STATIONS.filter(s => s.cat === cat.key);
        if(!stns.length) return;
        const lbl = document.createElement('div'); lbl.className = 'section-label'; lbl.textContent = cat.label; list.appendChild(lbl);
        stns.forEach(s => {
            const b = document.createElement('button'); b.className = 'stn-btn'; b.id = 'stn-'+s.n;
            b.onclick = () => playStation(s);
            b.innerHTML = `<span class="stn-num">${s.n}</span><span class="stn-name">${s.name}</span><span class="stn-live"><span class="live-dot"></span>LIVE</span>`;
            list.appendChild(b);
        });
        if(cat.key === 'atc') buildAviationLinks(list);
    });
    setInterval(tickClock, 1000);
    startSynthViz();
}

function buildAviationLinks(container) {
    const row = document.createElement('div'); row.style.display = 'flex'; row.style.gap = '6px'; row.style.marginTop = '8px';
    const links = [{h:'https://skyvector.com/', c:'#2a6496', l:'SKYVECTOR'},{h:'https://www.liveatc.net/', c:'#2a7a3a', l:'LIVEATC'},{h:'https://flightaware.com/', c:'#7a3a8a', l:'FLIGHTAWARE'}];
    links.forEach(link => {
        const a = document.createElement('a'); a.href = link.h; a.target = '_blank'; a.className = 'atc-link'; a.style.color = a.style.borderColor = link.c; a.style.background = 'rgba(255,255,255,0.03)';
        a.textContent = link.l; row.appendChild(a);
    });
    container.appendChild(row);
}

function playStation(station) {
    stopPlay();
    curIdx = STATIONS.indexOf(station);
    document.getElementById('stn-'+station.n).classList.add('active');
    document.getElementById('npStation').textContent = station.name;
    document.getElementById('npStation').classList.remove('idle');
    audio.src = station.url;
    audio.play().then(() => {
        updateMediaSession(station.name, "Live Feed");
        document.getElementById('sigbars').classList.add('active');
    }).catch(() => showToast("Tap to play"));
}

function playMp3(i) {
    stopPlay();
    mp3CurIdx = i;
    const t = mp3Tracks[i];
    document.getElementById('mp3-'+i)?.classList.add('active');
    document.getElementById('npStation').textContent = t.name;
    document.getElementById('npStation').classList.remove('idle');
    audio.src = t.url;
    audio.play().then(() => updateMediaSession(t.name, "Local MP3"));
}

function toggleStop() {
    if (!audio.paused) { audio.pause(); document.getElementById('btnStop').innerHTML = '▶ RESUME'; }
    else if (audio.src) { audio.play(); document.getElementById('btnStop').innerHTML = '■ STOP'; }
}

function stopPlay() {
    audio.pause();
    document.querySelectorAll('.stn-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('sigbars').classList.remove('active');
    curIdx = -1; mp3CurIdx = -1;
}

function setVolume(v) { audio.volume = v; }

function updateMediaSession(title, artist) {
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.metadata = new MediaMetadata({ title, artist, album: "WolfTronix Radio" });
}

function startSynthViz() {
    const canvas = document.getElementById('vizCanvas');
    const ctx = canvas.getContext('2d');
    function draw() {
        vizRAF = requestAnimationFrame(draw);
        const w = canvas.width = canvas.offsetWidth; const h = canvas.height = canvas.offsetHeight;
        ctx.fillStyle = '#12121a'; ctx.fillRect(0,0,w,h);
        const active = (curIdx >= 0 || mp3CurIdx >= 0) && !audio.paused;
        synthPhase += active ? 0.1 : 0.02;
        
        if (vizMode === 'fft') {
            for(let i=0; i<32; i++) {
                const bH = active ? Math.abs(Math.sin(synthPhase + i*0.2)) * h * 0.7 : 2;
                ctx.fillStyle = active ? 'var(--accent)' : 'var(--muted)';
                ctx.fillRect(i*(w/32), h-bH, (w/32)-2, bH);
            }
        } else if (vizMode === 'radar') {
            ctx.strokeStyle = active ? 'var(--green)' : 'var(--muted)';
            ctx.beginPath(); ctx.arc(w/2, h/2, active ? Math.abs(Math.sin(synthPhase)*40)+20 : 30, 0, Math.PI*2); ctx.stroke();
            ctx.moveTo(w/2, h/2); ctx.lineTo(w/2 + Math.cos(synthPhase)*50, h/2 + Math.sin(synthPhase)*50); ctx.stroke();
        } else {
            ctx.strokeStyle = 'var(--accent)'; ctx.beginPath();
            for(let x=0; x<w; x++) ctx.lineTo(x, h/2 + Math.sin(x*0.05 + synthPhase)* (active?20:2));
            ctx.stroke();
        }
    }
    if(!vizRAF) draw();
}

function setVizMode(m, btn) {
    vizMode = m;
    document.querySelectorAll('.viz-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function tickClock() {
    const now = new Date();
    document.getElementById('clockDisplay').textContent = now.toTimeString().split(' ')[0];
    document.getElementById('utcDisplay').textContent = now.toISOString().split('T')[1].split('.')[0];
}

function switchTab(id, el) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('panel-'+id).classList.add('active');
    el.classList.add('active');
}

function loadMp3Files(files) {
    mp3Tracks = Array.from(files).map((f, i) => ({ idx: i, name: f.name.replace(/\.[^.]+$/, ''), url: URL.createObjectURL(f) }));
    const container = document.getElementById('mp3Tracks'); container.innerHTML = '';
    mp3Tracks.forEach((t, i) => {
        const b = document.createElement('button'); b.className = 'stn-btn'; b.id = 'mp3-' + i;
        b.onclick = () => playMp3(i);
        b.innerHTML = `<span class="stn-num">${i+1}</span><span class="stn-name">${t.name}</span>`;
        container.appendChild(b);
    });
    document.getElementById('mp3TrackList').style.display = 'block';
}

function showToast(m) {
    const t = document.getElementById('toast'); t.textContent = m; t.className = 'toast show';
    setTimeout(() => t.className = 'toast', 3000);
}

window.addEventListener('load', buildUI);
</script>
</body>
</html>
