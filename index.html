<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Radio v2.25</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --surface:#12121a; --border:#1e1e2e;
  --accent:#00d4ff; --green:#39ff82; --amber:#ffb347; --red:#ff4466;
  --text:#c8d0e0; --muted:#4a5060;
  --mono:'Share Tech Mono',monospace; --sans:'Barlow Condensed',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px)}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.96);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 14px 8px}
.header-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.logo{font-family:var(--mono);font-size:1em;color:var(--accent);letter-spacing:3px}
.clock-display{font-family:var(--mono);font-size:1.3em;color:var(--green);margin-left:auto;letter-spacing:2px}
.sigbars{display:flex;gap:2px;align-items:flex-end;height:14px}
.sigbars span{width:3px;border-radius:1px;background:var(--muted);transition:background 0.3s}
.sigbars span:nth-child(1){height:4px}.sigbars span:nth-child(2){height:7px}
.sigbars span:nth-child(3){height:10px}.sigbars span:nth-child(4){height:14px}
.sigbars.active span{background:var(--green);box-shadow:0 0 4px var(--green)}
.now-playing{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 12px}
.np-station{font-weight:700;font-size:1em;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-station.idle{color:var(--muted);font-weight:300}
.np-meta{font-family:var(--mono);font-size:0.65em;color:var(--accent);margin-top:3px;min-height:1em}
.np-controls{display:flex;align-items:center;gap:8px;margin-top:7px}
.btn-stop{background:rgba(255,68,102,0.15);border:1px solid var(--red);color:var(--red);
  font-family:var(--mono);font-size:0.68em;letter-spacing:1px;padding:4px 10px;border-radius:4px;cursor:pointer}
.vol-wrap{flex:1;display:flex;align-items:center;gap:6px}
input[type=range]{flex:1;-webkit-appearance:none;height:3px;background:var(--border);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:90}
.tab{flex:1;padding:10px 4px;font-family:var(--mono);font-size:0.6em;text-align:center;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* PANELS */
.panel{display:none;padding:10px 12px 80px}
.panel.active{display:block}

/* STATIONS & LISTS */
.section-label{font-family:var(--mono);font-size:0.6em;letter-spacing:3px;color:var(--muted);padding:12px 4px 5px;border-bottom:1px solid var(--border);margin-bottom:5px}
.stn-btn{display:flex;align-items:center;width:100%;padding:10px 12px;margin-bottom:4px;background:var(--surface);border:1px solid var(--border);border-radius:6px;cursor:pointer;text-align:left;gap:10px}
.stn-btn.active{border-color:var(--accent);background:rgba(0,212,255,0.05)}
.stn-name{flex:1;font-weight:500}
.stn-live{display:none;color:var(--green);font-size:0.6em;font-family:var(--mono)}
.stn-btn.active .stn-live{display:block}

/* VIZ */
#vizCanvas{width:100%;height:150px;background:var(--surface);border-radius:6px;border:1px solid var(--border)}
</style>
</head>
<body>

<audio id="audio" preload="none" playsinline webkit-playsinline></audio>

<header>
  <div class="header-top">
    <div class="logo">■ RADIO <span id="verNum">v2.25</span></div>
    <div class="sigbars" id="sigbars"><span></span><span></span><span></span><span></span></div>
    <div class="clock-display" id="clockDisplay">00:00:00</div>
  </div>
  <div class="now-playing">
    <div class="np-station idle" id="npStation">Select a station</div>
    <div class="np-meta" id="npMeta">&nbsp;</div>
    <div class="np-controls">
      <button class="btn-stop" id="btnStop" onclick="toggleStop()">■ STOP</button>
      <div class="vol-wrap">
        <input type="range" id="volSlider" min="0" max="1" step="0.02" value="0.8" oninput="setVolume(this.value)">
      </div>
    </div>
    <div id="seekRow" style="display:none;align-items:center;gap:6px;margin-top:6px">
      <span id="seekCur" style="font-size:0.7em">0:00</span>
      <input type="range" id="seekSlider" min="0" max="100" step="0.1" value="0" oninput="seekMp3(this.value)">
      <span id="seekDur" style="font-size:0.7em">0:00</span>
    </div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('stations',this)">STATIONS</div>
  <div class="tab" onclick="switchTab('mp3',this)">MP3</div>
  <div class="tab" onclick="switchTab('viz',this)">VIZ</div>
</div>

<div class="panel active" id="panel-stations">
  <div id="stationList"></div>
</div>

<div class="panel" id="panel-mp3">
  <label style="display:block;padding:20px;border:1px dashed var(--accent);text-align:center;cursor:pointer">
    📂 LOAD LOCAL MP3s
    <input type="file" id="mp3FileInput" multiple accept="audio/*" style="display:none" onchange="loadMp3Files(this.files)">
  </label>
  <div id="mp3Tracks" style="margin-top:10px"></div>
</div>

<div class="panel" id="panel-viz">
  <canvas id="vizCanvas"></canvas>
  <p style="font-size:0.7em;color:var(--muted);margin-top:10px;font-family:var(--mono)">iOS: Visualization uses synthetic heartbeat during backgrounding.</p>
</div>

<script>
const STATIONS = [
  {n:1, name:"181.FM Awesome 80s", url:"http://listen.181fm.com/181-awesome80s_128k.mp3", cat:"music"},
  {n:2, name:"SomaFM Underground 80s", url:"http://ice1.somafm.com/u80s-128-mp3", cat:"music"},
  {n:3, name:"Antenne Bayern", url:"http://stream.antenne.de/antenne/stream/mp3", cat:"german"},
  {n:8, name:"KMYF ATIS", url:"http://s1-fmt2.liveatc.net/ksan_kmyf_atis", cat:"atc"},
  {n:9, name:"KMYF Tower", url:"http://d.liveatc.net/kmyf1_twr", cat:"atc"}
];

const audio = document.getElementById('audio');
let curIdx = -1, mp3CurIdx = -1, mp3Tracks = [], audioCtx = null, keepAliveNode = null;

// BACKGROUND ENGINE: Silent 1Hz oscillator keeps iOS Audio Session active
function startKeepAlive() {
  if (keepAliveNode) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const gainNode = audioCtx.createGain();
    gainNode.gain.value = 0.001;
    gainNode.connect(audioCtx.destination);
    const osc = audioCtx.createOscillator();
    osc.frequency.value = 1;
    osc.connect(gainNode);
    osc.start();
    keepAliveNode = osc;
  } catch(e) { console.log("Engine init pending..."); }
}

function ensureEngine() {
  if (!keepAliveNode) startKeepAlive();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function updateMediaSession(title, artist) {
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: title,
      artist: artist,
      album: "WolfTronix Radio"
    });
    navigator.mediaSession.setActionHandler('play', () => audio.play());
    navigator.mediaSession.setActionHandler('pause', () => {
      if (mp3CurIdx >= 0) audio.pause(); else stopPlay();
    });
  }
}

function play(station) {
  if (curIdx >= 0) document.getElementById('stn-'+STATIONS[curIdx].n)?.classList.remove('active');
  curIdx = STATIONS.indexOf(station);
  mp3CurIdx = -1;
  document.getElementById('npStation').textContent = station.name;
  document.getElementById('npStation').classList.remove('idle');
  document.getElementById('stn-'+station.n)?.classList.add('active');
  document.getElementById('sigbars').classList.add('active');

  audio.pause();
  audio.crossOrigin = "anonymous";
  audio.src = station.url;
  audio.load();
  audio.play().then(() => {
    ensureEngine();
    updateMediaSession(station.name, "Live Radio");
    document.getElementById('seekRow').style.display = 'none';
  }).catch(e => { document.getElementById('npMeta').textContent = "Tap Play Again"; });
}

function loadMp3Files(files) {
  mp3Tracks = Array.from(files).map((f, i) => ({
    name: f.name.replace(/\.[^.]+$/, ''),
    url: URL.createObjectURL(f)
  }));
  const container = document.getElementById('mp3Tracks');
  container.innerHTML = '';
  mp3Tracks.forEach((t, i) => {
    const b = document.createElement('button');
    b.className = 'stn-btn'; b.id = 'mp3-'+i;
    b.innerHTML = `<span class="stn-name">${t.name}</span>`;
    b.onclick = () => playMp3(i);
    container.appendChild(b);
  });
}

function playMp3(i) {
  if (curIdx >= 0) { document.getElementById('stn-'+STATIONS[curIdx].n)?.classList.remove('active'); curIdx = -1; }
  if (mp3CurIdx >= 0) document.getElementById('mp3-'+mp3CurIdx)?.classList.remove('active');
  mp3CurIdx = i;
  const t = mp3Tracks[i];
  document.getElementById('mp3-'+i).classList.add('active');
  document.getElementById('npStation').textContent = t.name;
  document.getElementById('npStation').classList.remove('idle');

  audio.pause();
  audio.removeAttribute('crossorigin'); // Critical: local blobs fail with crossorigin=anonymous
  audio.src = t.url;
  audio.load();
  audio.play().then(() => {
    ensureEngine();
    updateMediaSession(t.name, "Local MP3");
    document.getElementById('seekRow').style.display = 'flex';
  });
}

function toggleStop() {
  if (!audio.paused) {
    audio.pause();
    document.getElementById('btnStop').innerHTML = "▶ RESUME";
  } else if (audio.src) {
    audio.play();
    document.getElementById('btnStop').innerHTML = "■ STOP";
  }
}

function stopPlay() {
  audio.pause(); audio.src = "";
  document.getElementById('npStation').textContent = "Select a station";
  document.getElementById('npStation').classList.add('idle');
  document.getElementById('sigbars').classList.remove('active');
}

function setVolume(v) { audio.volume = v; }
function seekMp3(v) { if(audio.duration) audio.currentTime = (v/100) * audio.duration; }

function switchTab(id, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  el.classList.add('active');
}

function tickClock() {
  const now = new Date();
  document.getElementById('clockDisplay').textContent = now.toTimeString().split(' ')[0];
  if (mp3CurIdx >= 0 && audio.duration) {
    const pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById('seekSlider').value = pct;
    document.getElementById('seekCur').textContent = Math.floor(audio.currentTime/60) + ":" + String(Math.floor(audio.currentTime%60)).padStart(2,'0');
    document.getElementById('seekDur').textContent = Math.floor(audio.duration/60) + ":" + String(Math.floor(audio.duration%60)).padStart(2,'0');
  }
}

// UI Setup
window.onload = () => {
  const list = document.getElementById('stationList');
  STATIONS.forEach(s => {
    const b = document.createElement('button');
    b.className = 'stn-btn'; b.id = 'stn-'+s.n;
    b.innerHTML = `<span class="stn-name">${s.name}</span><span class="stn-live">● LIVE</span>`;
    b.onclick = () => play(s);
    list.appendChild(b);
  });
  setInterval(tickClock, 1000);
};

// AUTO-RESUME if iOS interrupts background
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && (curIdx >= 0 || mp3CurIdx >= 0) && audio.paused) {
    audio.play().catch(()=>{});
  }
});
</script>
</body>
</html>
