<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>Radio v2.36</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --surface:#12121a; --border:#1e1e2e;
  --accent:#00d4ff; --green:#39ff82; --amber:#ffb347; --red:#ff4466;
  --text:#c8d0e0; --muted:#4a5060;
  --mono:'Share Tech Mono',monospace; --sans:'Barlow Condensed',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px)}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 14px 8px}
.header-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.logo{font-family:var(--mono);font-size:1em;color:var(--accent);letter-spacing:3px}
.clock-display{font-family:var(--mono);font-size:1.3em;color:var(--green);margin-left:auto;letter-spacing:2px}
.sigbars{display:flex;gap:2px;align-items:flex-end;height:14px}
.sigbars span{width:3px;border-radius:1px;background:var(--muted);transition:background 0.3s}
.sigbars.active span{background:var(--green);box-shadow:0 0 4px var(--green)}
.now-playing{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 12px}
.np-station{font-weight:700;font-size:1em;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-controls{display:flex;align-items:center;gap:8px;margin-top:7px}
.btn-stop{background:rgba(255,68,102,0.15);border:1px solid var(--red);color:var(--red);font-family:var(--mono);font-size:0.68em;padding:4px 10px;border-radius:4px;cursor:pointer}
input[type=range]{flex:1;-webkit-appearance:none;height:3px;background:var(--border);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent)}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:90}
.tab{flex:1;padding:10px 4px;font-family:var(--mono);font-size:0.6em;text-align:center;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.panel{display:none;padding:10px 12px 80px}
.panel.active{display:block}

/* CARDS, PILLS & LABELS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px}
.card-title{font-family:var(--mono);font-size:0.65em;letter-spacing:2px;color:var(--muted);margin-bottom:10px}
.pill-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.pill{font-family:var(--mono);font-size:0.7em;padding:6px 12px;border:1px solid var(--border);border-radius:20px;background:var(--bg);color:var(--muted);cursor:pointer}
.pill.active{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,0.08)}
.countdown{font-family:var(--mono);font-size:2.4em;color:var(--green);text-align:center;padding:10px 0;letter-spacing:4px}
.section-label{font-family:var(--mono);font-size:0.6em;letter-spacing:3px;color:var(--muted);padding:12px 4px 5px;border-bottom:1px solid var(--border);margin-bottom:5px}
.stn-btn{display:flex;align-items:center;width:100%;padding:10px 12px;margin-bottom:4px;background:var(--surface);border:1px solid var(--border);border-radius:6px;cursor:pointer;text-align:left;gap:10px}
.stn-btn.active{border-color:var(--accent);background:rgba(0,212,255,0.05)}
.stn-num{font-family:var(--mono);font-size:0.62em;color:var(--muted);min-width:20px}
.atc-link{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px 4px;border:1px solid;border-radius:6px;font-family:var(--mono);font-size:0.65em;text-decoration:none;text-align:center}

#vizCanvas{width:100%;height:150px;border-radius:6px;background:var(--surface);border:1px solid var(--border);display:block}

.wake-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(5,5,10,0.98);flex-direction:column;align-items:center;justify-content:center;gap:20px}
.wake-overlay.show{display:flex}
.wake-time{font-family:var(--mono);font-size:4em;color:var(--green)}
</style>
</head>
<body id="mainBody">

<audio id="audio" preload="auto" crossorigin="anonymous" playsinline webkit-playsinline></audio>

<div class="wake-overlay" id="wakeOverlay">
    <div style="font-family:var(--mono);color:var(--muted)">WAKE UP</div>
    <div class="wake-time" id="wakeTimeDisp">00:00</div>
    <button onclick="wakePlay()" style="background:var(--green);padding:20px 40px;border:none;border-radius:8px;font-weight:700">▶ START</button>
</div>

<header>
    <div class="header-top">
        <div class="logo">■ RADIO <span style="font-size:0.8em;color:var(--accent)">v2.36</span></div>
        <div class="sigbars" id="sigbars"><span></span><span></span><span></span><span></span></div>
        <div style="display:flex;flex-direction:column;align-items:flex-end">
            <div class="clock-display" id="clockDisplay">00:00:00</div>
            <div style="font-family:var(--mono);font-size:0.8em;color:var(--muted)"><span id="utcDisplay">00:00:00</span> <span style="color:var(--amber)">UTC</span></div>
        </div>
    </div>
    <div class="now-playing">
        <div id="npStation" class="np-station">Ready</div>
        <div class="np-controls">
            <button class="btn-stop" onclick="toggleStop()">■ STOP</button>
            <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.8" oninput="audio.volume = this.value">
        </div>
    </div>
</header>

<div class="tabs">
    <div class="tab active" onclick="switchTab('stations',this)">STATIONS</div>
    <div class="tab" onclick="switchTab('mp3',this)">MP3</div>
    <div class="tab" onclick="switchTab('viz',this)">VIZ</div>
    <div class="tab" onclick="switchTab('timer',this)">TIMER</div>
    <div class="tab" onclick="switchTab('alarm',this)">ALARM</div>
</div>

<div class="panel active" id="panel-stations"><div id="stationList"></div></div>

<div class="panel" id="panel-mp3">
    <div class="card">
        <div class="card-title">LOCAL STORAGE</div>
        <label style="display:block;padding:15px;border:1px dashed var(--accent);text-align:center;cursor:pointer;color:var(--accent);font-size:0.8em">
            📁 CHOOSE FILES
            <input type="file" multiple accept="audio/*" style="display:none" onchange="loadFiles(this.files)">
        </label>
    </div>
    <div id="mp3Tracks"></div>
</div>

<div class="panel" id="panel-viz">
    <canvas id="vizCanvas"></canvas>
    <div class="pill-row" style="margin-top:10px">
        <div class="pill active" onclick="setViz('fft',this)">FFT</div>
        <div class="pill" onclick="setViz('radar',this)">RADAR</div>
    </div>
</div>

<div class="panel" id="panel-timer">
    <div class="card">
        <div class="card-title">SLEEP TIMER</div>
        <div class="pill-row">
            <div class="pill" onclick="setSleep(15)">15 MIN</div>
            <div class="pill" onclick="setSleep(30)">30 MIN</div>
            <div class="pill" onclick="setSleep(60)">60 MIN</div>
        </div>
        <div id="sleepCountdown" class="countdown">OFF</div>
        <div class="pill-row" style="justify-content:center"><div class="pill" style="border-color:var(--red);color:var(--red)" onclick="clearSleep()">CANCEL</div></div>
    </div>
</div>

<div class="panel" id="panel-alarm">
    <div class="card">
        <div class="card-title">WAKE ALARM</div>
        <input type="time" id="alarmTime" style="width:100%;padding:10px;background:var(--bg);color:var(--accent);border:1px solid var(--border)">
        <select id="alarmStn" style="width:100%;margin-top:10px;padding:10px;background:var(--bg);color:var(--text);border:1px solid var(--border)"></select>
        <button onclick="setAlarm()" style="width:100%;margin-top:10px;background:var(--accent);color:#000;padding:12px;font-weight:700">SET ALARM</button>
    </div>
</div>

<script>
const audio = document.getElementById('audio');
let audioCtx, analyser, source;

const STATIONS = [
  {n:1, name:"181.FM Awesome 80s", url:"https://listen.181fm.com/181-awesome80s_128k.mp3", cat:"music"},
  {n:2, name:"SomaFM Underground 80s", url:"https://ice1.somafm.com/u80s-128-mp3", cat:"music"},
  {n:3, name:"Antenne Bayern", url:"https://stream.antenne.de/antenne/stream/mp3", cat:"german"},
  {n:4, name:"1LIVE WDR", url:"https://wdr-1live-live.icecast.wdr.de/wdr/1live/live/mp3/128/stream.mp3", cat:"german"},
  {n:5, name:"SWR3", url:"https://liveradio.swr.de/sw282p3/swr3/play.mp3", cat:"german"},
  {n:6, name:"Bayern 3", url:"https://dispatcher.rndfnk.com/br/br3/live/mp3/low", cat:"german"},
  {n:7, name:"SWR1", url:"https://liveradio.swr.de/sw282p3/swr1bw/play.mp3", cat:"german"},
  {n:8, name:"KMYF ATIS", url:"https://s1-fmt2.liveatc.net/ksan_kmyf_atis", cat:"atc"},
  {n:9, name:"KMYF Tower", url:"https://d.liveatc.net/kmyf1_twr", cat:"atc"},
  {n:10, name:"KMYF Ground", url:"https://d.liveatc.net/ksan_kmyf_gnd", cat:"atc"},
  {n:11, name:"KSAN Tower", url:"https://d.liveatc.net/ksan1_twr", cat:"atc"},
  {n:12, name:"KSDM Tower", url:"https://d.liveatc.net/ksdm_twr", cat:"atc"},
  {n:13, name:"KRNM Tower", url:"https://d.liveatc.net/krnm2_twr", cat:"atc"},
  {n:14, name:"KSMO Tower", url:"https://d.liveatc.net/ksmo2_s", cat:"atc"}
];

let sleepEnd=null, alarmActive=false, vizMode='fft';

function initAudioContext() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    source = audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    analyser.fftSize = 256;
}

function buildUI() {
    const list = document.getElementById('stationList');
    const alSel = document.getElementById('alarmStn');
    ['german','music','atc'].forEach(c => {
        const lbl = document.createElement('div'); lbl.className='section-label'; lbl.textContent=c.toUpperCase(); list.appendChild(lbl);
        STATIONS.filter(s=>s.cat===c).forEach(s => {
            const b = document.createElement('button'); b.className='stn-btn'; b.id='stn-'+s.n;
            b.onclick = () => playStn(s);
            b.innerHTML = `<span class="stn-num">${s.n}</span><span>${s.name}</span>`;
            list.appendChild(b);
            const opt = document.createElement('option'); opt.value=s.n; opt.textContent=s.name; alSel.appendChild(opt);
        });
        if(c==='atc') buildLinks(list);
    });
    setInterval(tick, 1000); startViz();
}

function buildLinks(list) {
    const r1 = document.createElement('div'); r1.style.display='flex'; r1.style.gap='6px'; r1.style.marginTop='10px';
    [{h:'https://skyvector.com/', l:'SKYVECTOR', c:'#2a6496'},{h:'https://www.liveatc.net/', l:'LIVEATC', c:'#2a7a3a'},{h:'https://flightaware.com/', l:'FLIGHTAWARE', c:'#7a3a8a'}].forEach(l => {
        const a = document.createElement('a'); a.href=l.h; a.target='_blank'; a.className='atc-link'; a.style.color=a.style.borderColor=l.c; a.textContent=l.l; r1.appendChild(a);
    });
    list.appendChild(r1);
    const r2 = document.createElement('div'); r2.style.display='flex'; r2.style.gap='6px'; r2.style.marginTop='6px';
    [{h:'https://www.plusoneflyers.org/', l:'PLUS ONE', c:'#b07a20'},{h:'https://my.schedulemaster.com/', l:'SCHEDULE', c:'#206060'}].forEach(l => {
        const a = document.createElement('a'); a.href=l.h; a.target='_blank'; a.className='atc-link'; a.style.color=a.style.borderColor=l.c; a.textContent=l.l; r2.appendChild(a);
    });
    list.appendChild(r2);
}

function playStn(s) {
    initAudioContext();
    audio.src=s.url; audio.play(); document.getElementById('npStation').textContent=s.name;
    document.querySelectorAll('.stn-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('stn-'+s.n).classList.add('active');
    document.getElementById('sigbars').classList.add('active');
}

function toggleStop() { if(audio.paused) audio.play(); else audio.pause(); }

function tick() {
    const now = new Date();
    document.getElementById('clockDisplay').textContent = now.toTimeString().split(' ')[0];
    document.getElementById('utcDisplay').textContent = now.toISOString().split('T')[1].slice(0,8);
    if(alarmActive && now.toTimeString().slice(0,5) === document.getElementById('alarmTime').value) {
        document.getElementById('wakeOverlay').classList.add('show');
        document.getElementById('wakeTimeDisp').textContent = now.toTimeString().slice(0,5);
    }
    if(sleepEnd) {
        const rem = sleepEnd - Date.now();
        if(rem <= 0) { audio.pause(); sleepEnd=null; document.getElementById('sleepCountdown').textContent="OFF"; }
        else { document.getElementById('sleepCountdown').textContent = Math.floor(rem/60000) + ":" + Math.floor((rem%60000)/1000).toString().padStart(2,'0'); }
    }
}

function startViz() {
    const c = document.getElementById('vizCanvas'); const ctx = c.getContext('2d');
    function draw() {
        requestAnimationFrame(draw);
        if(!document.getElementById('panel-viz').classList.contains('active') || !analyser) return;
        
        const w=c.width=c.offsetWidth, h=c.height=c.offsetHeight;
        ctx.fillStyle='#12121a'; ctx.fillRect(0,0,w,h);
        const data = new Uint8Array(analyser.frequencyBinCount);
        
        if(vizMode==='fft'){
            analyser.getByteFrequencyData(data);
            const barW = w / data.length * 2.5;
            let x = 0;
            for(let i=0; i<data.length; i++){
                const barH = (data[i]/255) * h;
                ctx.fillStyle = 'var(--accent)';
                ctx.fillRect(x, h-barH, barW-1, barH);
                x += barW;
            }
        } else {
            analyser.getByteTimeDomainData(data);
            ctx.strokeStyle='var(--green)'; ctx.beginPath();
            const sliceW = w / data.length;
            let x = 0;
            for(let i=0; i<data.length; i++){
                const v = data[i] / 128.0;
                const y = v * h / 2;
                if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
                x += sliceW;
            }
            ctx.stroke();
        }
    }
    draw();
}

function switchTab(id, el) { 
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); 
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); 
    document.getElementById('panel-'+id).classList.add('active'); el.classList.add('active'); 
}

function setViz(m, b) { vizMode=m; document.querySelectorAll('#panel-viz .pill').forEach(p=>p.classList.remove('active')); b.classList.add('active'); }
function setSleep(m) { sleepEnd = Date.now() + m*60000; }
function clearSleep() { sleepEnd=null; document.getElementById('sleepCountdown').textContent="OFF"; }
function setAlarm() { alarmActive=true; }
function wakePlay() { audio.play(); document.getElementById('wakeOverlay').classList.remove('show'); }

function loadFiles(fs) {
    const cont = document.getElementById('mp3Tracks'); cont.innerHTML='';
    Array.from(fs).forEach(f => {
        const b = document.createElement('button'); b.className='stn-btn';
        b.onclick = () => { initAudioContext(); audio.src=URL.createObjectURL(f); audio.play(); document.getElementById('npStation').textContent=f.name; };
        b.innerHTML = `<span>#</span><span>${f.name}</span>`; cont.appendChild(b);
    });
}

window.addEventListener('load', buildUI);
</script>
</body>
</html>
