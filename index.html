<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>Radio v2.37</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<style>
:root {
  --bg:#0a0a0f; --surface:#12121a; --border:#1e1e2e;
  --accent:#00d4ff; --green:#39ff82; --amber:#ffb347; --red:#ff4466;
  --text:#c8d0e0; --muted:#4a5060;
  --mono:'Share Tech Mono',monospace; --sans:'Barlow Condensed',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px)}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 14px 8px}
.header-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.logo{font-family:var(--mono);font-size:1em;color:var(--accent);letter-spacing:3px}
.clock-display{font-family:var(--mono);font-size:1.3em;color:var(--green);margin-left:auto;letter-spacing:2px}
.sigbars{display:flex;gap:2px;align-items:flex-end;height:14px}
.sigbars span{width:3px;border-radius:1px;background:var(--muted);transition:background 0.3s}
.sigbars.active span{background:var(--green);box-shadow:0 0 4px var(--green)}
.now-playing{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 12px}
.np-station{font-weight:700;font-size:1em;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-controls{display:flex;align-items:center;gap:8px;margin-top:7px}
.btn-stop{background:rgba(255,68,102,0.15);border:1px solid var(--red);color:var(--red);font-family:var(--mono);font-size:0.68em;padding:4px 10px;border-radius:4px;cursor:pointer}
input[type=range]{flex:1;-webkit-appearance:none;height:3px;background:var(--border);outline:none;border-radius:2px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:90}
.tab{flex:1;padding:10px 4px;font-family:var(--mono);font-size:0.65em;text-align:center;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:0.2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.panel{display:none;padding:12px 14px 80px}
.panel.active{display:block}

/* UI ELEMENTS: CARDS & PILLS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:14px}
.card-title{font-family:var(--mono);font-size:0.7em;letter-spacing:2px;color:var(--muted);margin-bottom:12px;text-align:center}
.pill-row{display:flex;gap:8px;justify-content:center;margin-bottom:12px}
.pill{font-family:var(--mono);font-size:0.75em;padding:8px 16px;border:1px solid var(--border);border-radius:20px;background:var(--bg);color:var(--muted);cursor:pointer;flex:1;text-align:center;transition:0.2s}
.pill.active{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,0.08)}

/* TIMER & ALARM SPECIFICS */
.countdown{font-family:var(--mono);font-size:2.8em;color:var(--green);text-align:center;padding:15px 0;letter-spacing:4px}
.countdown.off{color:var(--muted);font-size:1.2em;letter-spacing:2px;padding:25px 0}
.form-input{width:100%;padding:12px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;font-family:var(--sans);font-size:1em;margin-bottom:12px;outline:none}
.form-input:focus{border-color:var(--accent)}
.btn-primary{width:100%;background:var(--accent);color:#000;border:none;border-radius:6px;padding:14px;font-family:var(--mono);font-size:0.8em;font-weight:700;letter-spacing:1px;cursor:pointer}

/* STATIONS LIST */
.section-label{font-family:var(--mono);font-size:0.65em;letter-spacing:3px;color:var(--muted);padding:14px 4px 6px;border-bottom:1px solid var(--border);margin-bottom:8px}
.stn-btn{display:flex;align-items:center;width:100%;padding:12px;margin-bottom:6px;background:var(--surface);border:1px solid var(--border);border-radius:6px;cursor:pointer;text-align:left;gap:12px;transition:0.2s}
.stn-btn.active{border-color:var(--accent);background:rgba(0,212,255,0.05)}
.stn-num{font-family:var(--mono);font-size:0.65em;color:var(--muted);min-width:24px}
.stn-name{font-size:1em;font-weight:500;color:var(--text);flex:1}

/* AVIATION LINKS */
.atc-link{flex:1;display:flex;align-items:center;justify-content:center;padding:10px 4px;border:1px solid;border-radius:6px;font-family:var(--mono);font-size:0.65em;text-decoration:none;text-align:center;background:rgba(255,255,255,0.03)}

/* VISUALIZER */
#vizCanvas{width:100%;height:180px;border-radius:6px;background:var(--bg);border:1px solid var(--border);display:block;margin-bottom:12px}

/* OVERLAYS */
.wake-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(10,10,15,0.98);flex-direction:column;align-items:center;justify-content:center;gap:20px}
.wake-overlay.show{display:flex}
.wake-time{font-family:var(--mono);font-size:5em;color:var(--green);text-shadow:0 0 20px rgba(57,255,130,0.4)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border);padding:10px 20px;border-radius:6px;transition:0.3s;z-index:500;font-family:var(--mono);font-size:0.7em}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body id="mainBody">

<audio id="audio" preload="none" playsinline webkit-playsinline></audio>
<div class="toast" id="toast"></div>

<div class="wake-overlay" id="wakeOverlay">
    <div style="font-family:var(--mono);color:var(--muted);letter-spacing:4px">WAKE ALARM</div>
    <div class="wake-time" id="wakeTimeDisp">00:00</div>
    <div id="wakeStnName" style="font-family:var(--sans);font-size:1.2em;color:var(--text);margin-bottom:20px"></div>
    <button onclick="wakePlay()" style="background:var(--green);color:#000;padding:16px 40px;border:none;border-radius:8px;font-family:var(--mono);font-size:1em;font-weight:700;letter-spacing:2px;cursor:pointer">▶ PLAY STATION</button>
    <div onclick="dismissAlarm()" style="color:var(--muted);cursor:pointer;margin-top:20px;font-family:var(--mono);font-size:0.7em;letter-spacing:1px">DISMISS</div>
</div>

<header>
    <div class="header-top">
        <div class="logo">■ RADIO <span style="font-size:0.8em;color:var(--accent)">v2.37</span></div>
        <div class="sigbars" id="sigbars"><span></span><span></span><span></span><span></span></div>
        <div style="display:flex;flex-direction:column;align-items:flex-end">
            <div class="clock-display" id="clockDisplay">00:00:00</div>
            <div style="font-family:var(--mono);font-size:0.8em;color:var(--muted)"><span id="utcDisplay">00:00:00</span> <span style="color:var(--amber)">UTC</span></div>
        </div>
    </div>
    <div class="now-playing">
        <div id="npStation" class="np-station idle">Select a station</div>
        <div class="np-controls">
            <button class="btn-stop" id="btnStop" onclick="toggleStop()">■ STOP</button>
            <input type="range" id="volSlider" min="0" max="1" step="0.02" value="0.8" oninput="setVolume(this.value)">
        </div>
    </div>
</header>

<div class="tabs">
    <div class="tab active" onclick="switchTab('stations',this)">STATIONS</div>
    <div class="tab" onclick="switchTab('mp3',this)">MP3</div>
    <div class="tab" onclick="switchTab('viz',this)">VIZ</div>
    <div class="tab" onclick="switchTab('timer',this)">TIMER</div>
    <div class="tab" onclick="switchTab('alarm',this)">ALARM</div>
</div>

<div class="panel active" id="panel-stations"><div id="stationList"></div></div>

<div class="panel" id="panel-mp3">
    <div class="card">
        <div class="card-title">LOCAL AUDIO</div>
        <label style="display:block;padding:16px;border:1px dashed var(--accent);border-radius:6px;text-align:center;cursor:pointer;color:var(--accent);font-family:var(--mono);font-size:0.75em;transition:0.2s">
            📁 CHOOSE LOCAL FILES
            <input type="file" multiple accept="audio/*" style="display:none" onchange="loadFiles(this.files)">
        </label>
        <button onclick="openGDrive()" style="width:100%;margin-top:12px;padding:16px;background:none;border:1px dashed #4285F4;border-radius:6px;color:#4285F4;font-family:var(--mono);font-size:0.75em;cursor:pointer;transition:0.2s">
            OPEN GOOGLE DRIVE
        </button>
        <div id="gDriveStatus" style="font-family:var(--mono);font-size:0.6em;text-align:center;margin-top:10px;color:var(--muted)"></div>
    </div>
    <div id="mp3Tracks"></div>
</div>

<div class="panel" id="panel-viz">
    <div class="card" style="padding:12px">
        <canvas id="vizCanvas"></canvas>
        <div class="pill-row" style="margin-bottom:0">
            <div class="pill active" id="vizBtnFFT" onclick="setViz('fft',this)">FFT</div>
            <div class="pill" id="vizBtnScope" onclick="setViz('scope',this)">SCOPE</div>
        </div>
    </div>
    <div style="font-family:var(--mono);font-size:0.6em;color:var(--muted);text-align:center;padding:0 10px">
        Note: Real-time visualizer requires local MP3 or Google Drive playback due to iOS stream security.
    </div>
</div>

<div class="panel" id="panel-timer">
    <div class="card">
        <div class="card-title">SLEEP TIMER</div>
        <div class="pill-row">
            <div class="pill" onclick="setSleep(15)">15 MIN</div>
            <div class="pill" onclick="setSleep(30)">30 MIN</div>
            <div class="pill" onclick="setSleep(60)">60 MIN</div>
        </div>
        <div id="sleepCountdown" class="countdown off">OFF</div>
        <button onclick="clearSleep()" style="width:100%;background:none;border:1px solid var(--red);color:var(--red);border-radius:6px;padding:12px;font-family:var(--mono);font-size:0.75em;cursor:pointer">CANCEL TIMER</button>
    </div>
</div>

<div class="panel" id="panel-alarm">
    <div class="card">
        <div class="card-title">WAKE ALARM</div>
        <input type="time" id="alarmTime" class="form-input">
        <select id="alarmStn" class="form-input" style="appearance:none"></select>
        <button onclick="setAlarm()" class="btn-primary">SET ALARM</button>
        <div id="alarmStat" style="font-family:var(--mono);font-size:0.7em;text-align:center;margin-top:12px;color:var(--green)"></div>
    </div>
</div>

<script>
// UPDATE THIS TO YOUR ACTUAL CLIENT ID TO USE GOOGLE DRIVE
const GDRIVE_CLIENT_ID = 'YOUR_CLIENT_ID.apps.googleusercontent.com';

const audio = document.getElementById('audio');
let audioCtx = null, analyser = null, source = null;

const STATIONS = [
  {n:1,  name:"181.FM Awesome 80s",   url:"https://listen.181fm.com/181-awesome80s_128k.mp3", cat:"music"},
  {n:2,  name:"SomaFM Underground 80s", url:"https://ice1.somafm.com/u80s-128-mp3", cat:"music"},
  {n:3,  name:"Antenne Bayern",       url:"https://stream.antenne.de/antenne/stream/mp3", cat:"german"},
  {n:4,  name:"1LIVE WDR",            url:"https://wdr-1live-live.icecast.wdr.de/wdr/1live/live/mp3/128/stream.mp3", cat:"german"},
  {n:5,  name:"SWR3",                 url:"https://liveradio.swr.de/sw282p3/swr3/play.mp3", cat:"german"},
  {n:6,  name:"Bayern 3",             url:"https://dispatcher.rndfnk.com/br/br3/live/mp3/low", cat:"german"},
  {n:7,  name:"SWR1",                 url:"https://liveradio.swr.de/sw282p3/swr1bw/play.mp3", cat:"german"},
  {n:8,  name:"KMYF ATIS",            url:"https://s1-fmt2.liveatc.net/ksan_kmyf_atis", cat:"atc"},
  {n:9,  name:"KMYF Tower",           url:"https://d.liveatc.net/kmyf1_twr", cat:"atc"},
  {n:10, name:"KMYF Ground",          url:"https://d.liveatc.net/ksan_kmyf_gnd", cat:"atc"},
  {n:11, name:"KMYF All (Twr)",       url:"https://d.liveatc.net/ksan_kmyf_twr_both", cat:"atc"},
  {n:12, name:"KMYF SoCal Del Mar",   url:"https://d.liveatc.net/ksan_app_delmar", cat:"atc"},
  {n:13, name:"KSAN Tower",           url:"https://d.liveatc.net/ksan1_twr", cat:"atc"},
  {n:14, name:"KSAN Ground",          url:"https://d.liveatc.net/ksan1_gnd", cat:"atc"},
  {n:15, name:"KSAN Clearance Del",   url:"https://d.liveatc.net/ksan1_del", cat:"atc"},
  {n:16, name:"KSAN SoCal East",      url:"https://d.liveatc.net/ksan_app_east", cat:"atc"},
  {n:17, name:"KSAN SoCal West",      url:"https://d.liveatc.net/ksan_app_west", cat:"atc"},
  {n:18, name:"KSAN All",             url:"https://d.liveatc.net/ksan1_all", cat:"atc"},
  {n:19, name:"KSDM Ground/Tower",    url:"https://d.liveatc.net/ksdm_twr", cat:"atc"},
  {n:20, name:"KRNM Ground",          url:"https://d.liveatc.net/krnm2_gnd", cat:"atc"},
  {n:21, name:"KRNM Ground/Tower",    url:"https://d.liveatc.net/krnm2_gnd_twr", cat:"atc"},
  {n:22, name:"KRNM Tower",           url:"https://d.liveatc.net/krnm2_twr", cat:"atc"},
  {n:23, name:"KSMO ATIS",            url:"https://d.liveatc.net/ksmo2_atis", cat:"atc"},
  {n:24, name:"KSMO Tower",           url:"https://d.liveatc.net/ksmo2_s", cat:"atc"},
  {n:25, name:"KSMO Ground",          url:"https://d.liveatc.net/ksmo2_gnd", cat:"atc"}
];

let sleepEnd = null, alarmActive = false, vizMode = 'fft', isVizActive = false;

// UI INITIALIZATION
function buildUI() {
    const list = document.getElementById('stationList');
    const alSel = document.getElementById('alarmStn');

    ['german','music','atc'].forEach(c => {
        const lbl = document.createElement('div'); lbl.className='section-label'; lbl.textContent=c.toUpperCase(); list.appendChild(lbl);
        STATIONS.filter(s=>s.cat===c).forEach(s => {
            const b = document.createElement('button'); b.className='stn-btn'; b.id='stn-'+s.n;
            b.onclick = () => playStn(s);
            b.innerHTML = `<span class="stn-num">${s.n}</span><span class="stn-name">${s.name}</span>`;
            list.appendChild(b);
            
            const opt = document.createElement('option'); opt.value=s.n; opt.textContent=s.name; alSel.appendChild(opt);
        });
        
        if(c==='atc') {
            const r1 = document.createElement('div'); r1.style.display='flex'; r1.style.gap='6px'; r1.style.marginTop='10px';
            [{h:'https://skyvector.com/', l:'SKYVECTOR', c:'#2a6496'},{h:'https://www.liveatc.net/', l:'LIVEATC', c:'#2a7a3a'},{h:'https://flightaware.com/', l:'FLIGHTAWARE', c:'#7a3a8a'}].forEach(l => {
                const a = document.createElement('a'); a.href=l.h; a.target='_blank'; a.className='atc-link'; a.style.color=a.style.borderColor=l.c; a.textContent=l.l; r1.appendChild(a);
            });
            list.appendChild(r1);

            const r2 = document.createElement('div'); r2.style.display='flex'; r2.style.gap='6px'; r2.style.marginTop='6px';
            [{h:'https://www.plusoneflyers.org/', l:'PLUS ONE', c:'#b07a20'},{h:'https://my.schedulemaster.com/', l:'SCHEDULE', c:'#206060'}].forEach(l => {
                const a = document.createElement('a'); a.href=l.h; a.target='_blank'; a.className='atc-link'; a.style.color=a.style.borderColor=l.c; a.textContent=l.l; r2.appendChild(a);
            });
            list.appendChild(r2);
        }
    });

    setInterval(tick, 1000); 
    startVizEngine();
}

// WEB AUDIO INIT (Must occur on user gesture)
function initAudio() {
    if (audioCtx) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return;
    }
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        source = audioCtx.createMediaElementSource(audio);
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
    } catch (e) { console.log("AudioContext Init Error:", e); }
}

// PLAYBACK LOGIC
function playStn(s) {
    initAudio();
    audio.src = s.url; 
    audio.play().then(() => updateState(s.name, s.n)).catch(() => showToast("Tap Play to start stream"));
}

function updateState(name, id) {
    document.getElementById('npStation').textContent = name;
    document.getElementById('npStation').classList.remove('idle');
    document.querySelectorAll('.stn-btn').forEach(b=>b.classList.remove('active'));
    if(id) {
        const btn = document.getElementById('stn-'+id);
        if(btn) btn.classList.add('active');
    }
    document.getElementById('sigbars').classList.add('active');
    document.getElementById('btnStop').innerHTML = '■ STOP';
    
    if('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({title: name, album: "WolfTronix Radio"});
    }
}

function toggleStop() { 
    if(audio.paused) { 
        audio.play(); 
        document.getElementById('btnStop').innerHTML = '■ STOP'; 
        document.getElementById('sigbars').classList.add('active');
    } else { 
        audio.pause(); 
        document.getElementById('btnStop').innerHTML = '▶ RESUME'; 
        document.getElementById('sigbars').classList.remove('active');
    } 
}

function setVolume(v) { audio.volume = v; }

// CLOCK, TIMER, & ALARM
function tick() {
    const now = new Date();
    document.getElementById('clockDisplay').textContent = now.toTimeString().split(' ')[0];
    document.getElementById('utcDisplay').textContent = now.toISOString().split('T')[1].slice(0,8);
    
    // Check Alarm
    if(alarmActive) {
        const t = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        if(t === document.getElementById('alarmTime').value) {
            triggerAlarm(t);
        }
    }
    
    // Check Sleep Timer
    if(sleepEnd) {
        const rem = sleepEnd - Date.now();
        const disp = document.getElementById('sleepCountdown');
        if(rem <= 0) { 
            audio.pause(); 
            clearSleep(); 
            document.getElementById('btnStop').innerHTML = '▶ RESUME';
            document.getElementById('sigbars').classList.remove('active');
        } else { 
            disp.textContent = Math.floor(rem/60000) + ":" + Math.floor((rem%60000)/1000).toString().padStart(2,'0'); 
            disp.classList.remove('off');
        }
    }
}

function setSleep(m) { 
    sleepEnd = Date.now() + m*60000; 
    showToast("Timer Set: " + m + " mins");
}
function clearSleep() { 
    sleepEnd = null; 
    const disp = document.getElementById('sleepCountdown');
    disp.textContent = "OFF"; 
    disp.classList.add('off');
    showToast("Timer Cancelled");
}

function setAlarm() { 
    const t = document.getElementById('alarmTime').value;
    if(!t) return showToast("Select a time first");
    alarmActive = true; 
    document.getElementById('alarmStat').textContent = "ACTIVE FOR " + t;
    showToast("Alarm Set");
}

function triggerAlarm(timeString) {
    alarmActive = false;
    document.getElementById('alarmStat').textContent = "";
    document.getElementById('wakeOverlay').classList.add('show');
    document.getElementById('wakeTimeDisp').textContent = timeString;
    
    const sid = document.getElementById('alarmStn').value;
    const stn = STATIONS.find(s => s.n == sid);
    if(stn) {
        document.getElementById('wakeStnName').textContent = stn.name;
    }
}

function wakePlay() { 
    const sid = document.getElementById('alarmStn').value;
    const stn = STATIONS.find(s => s.n == sid);
    if(stn) playStn(stn);
    else audio.play();
    document.getElementById('wakeOverlay').classList.remove('show'); 
}

function dismissAlarm() {
    document.getElementById('wakeOverlay').classList.remove('show'); 
}

// TRUE WEB AUDIO VISUALIZER (Sputter-Proofed for iOS)
function startVizEngine() {
    const c = document.getElementById('vizCanvas'); 
    const ctx = c.getContext('2d');
    const dataArray = new Uint8Array(256);
    
    function draw() {
        requestAnimationFrame(draw);
        
        // Critical iOS Fix: Do absolutely zero work if tab is hidden
        if (!isVizActive || document.hidden) return;
        
        const w = c.width = c.offsetWidth, h = c.height = c.offsetHeight;
        ctx.fillStyle = '#12121a'; 
        ctx.fillRect(0, 0, w, h);
        
        // If audio isn't hooked up yet, or it's paused, draw flatline
        if (!analyser || audio.paused) {
            ctx.strokeStyle = 'var(--muted)'; ctx.lineWidth = 2; ctx.beginPath();
            ctx.moveTo(0, h/2); ctx.lineTo(w, h/2); ctx.stroke();
            return;
        }

        if(vizMode === 'fft') {
            analyser.getByteFrequencyData(dataArray);
            const barCount = 40;
            const barW = (w / barCount) - 2;
            let x = 0;
            
            for(let i = 0; i < barCount; i++) {
                const rawH = dataArray[i]; // 0 to 255
                const barH = (rawH / 255) * h * 0.9;
                
                ctx.fillStyle = rawH > 200 ? 'var(--green)' : 'var(--accent)';
                if (barH > 0) ctx.fillRect(x, h - barH, barW, barH);
                x += barW + 2;
            }
        } else {
            analyser.getByteTimeDomainData(dataArray);
            ctx.strokeStyle = 'var(--green)'; 
            ctx.lineWidth = 2; 
            ctx.beginPath();
            
            const sliceW = w / dataArray.length;
            let x = 0;
            for(let i = 0; i < dataArray.length; i++) {
                const v = dataArray[i] / 128.0; // 0 to 2.0
                const y = v * h / 2;
                if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                x += sliceW;
            }
            ctx.stroke();
        }
    }
    draw();
}

function setViz(m, btn) { 
    vizMode = m; 
    document.querySelectorAll('#panel-viz .pill').forEach(p=>p.classList.remove('active')); 
    btn.classList.add('active'); 
}

// TAB MANAGEMENT
function switchTab(id, el) { 
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); 
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); 
    document.getElementById('panel-'+id).classList.add('active'); 
    el.classList.add('active'); 
    
    // Only allow Viz loop to run when VIZ tab is visible
    isVizActive = (id === 'viz');
}

function showToast(m) { 
    const t = document.getElementById('toast'); 
    t.textContent = m; t.className = 'toast show'; 
    setTimeout(() => t.className = 'toast', 3000); 
}

// LOCAL MP3
function loadFiles(fs) {
    const cont = document.getElementById('mp3Tracks'); cont.innerHTML='';
    Array.from(fs).forEach((f, i) => {
        const b = document.createElement('button'); b.className='stn-btn';
        b.onclick = () => { 
            initAudio(); 
            audio.src = URL.createObjectURL(f); 
            audio.play().then(()=> updateState(f.name, null)); 
        };
        b.innerHTML = `<span class="stn-num">${i+1}</span><span class="stn-name">${f.name}</span>`; 
        cont.appendChild(b);
    });
}

// GOOGLE DRIVE
function openGDrive() {
    if(GDRIVE_CLIENT_ID.includes('YOUR_CLIENT')) {
        showToast("Configure Client ID in code first");
        return;
    }
    google.accounts.oauth2.initTokenClient({
        client_id: GDRIVE_CLIENT_ID, 
        scope: 'https://www.googleapis.com/auth/drive.readonly',
        callback: (r) => { if(r.access_token) buildPicker(r.access_token); }
    }).requestAccessToken();
}

function buildPicker(t) {
    const v = new google.picker.DocsView().setMimeTypes('audio/mpeg,audio/mp3,audio/wav');
    new google.picker.PickerBuilder().addView(v).setOAuthToken(t).setCallback((d)=>{
        if(d.action == google.picker.Action.PICKED) fetchDrive(d.docs, t);
    }).build().setVisible(true);
}

async function fetchDrive(docs, t) {
    const stat = document.getElementById('gDriveStatus');
    const cont = document.getElementById('mp3Tracks'); 
    cont.innerHTML='';
    stat.textContent = "Buffering tracks...";
    
    try {
        for(let i=0; i<docs.length; i++) {
            const doc = docs[i];
            const r = await fetch(`https://www.googleapis.com/drive/v3/files/${doc.id}?alt=media&acknowledgeAbuse=true`, {headers: {Authorization: `Bearer ${t}`}});
            const blob = await r.blob();
            const u = URL.createObjectURL(blob);
            
            const b = document.createElement('button'); b.className='stn-btn';
            b.onclick = () => { 
                initAudio(); 
                audio.src = u; 
                audio.play().then(()=> updateState(doc.name, null)); 
            };
            b.innerHTML = `<span class="stn-num">${i+1}</span><span class="stn-name">${doc.name}</span>`; 
            cont.appendChild(b);
        }
        stat.textContent = `${docs.length} tracks ready.`;
    } catch(err) {
        stat.textContent = "Error loading Drive tracks.";
        console.error(err);
    }
}

window.addEventListener('load', buildUI);
</script>
